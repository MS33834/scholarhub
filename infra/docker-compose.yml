# Local development stack for ScholarHUB.
# Copy .env.example to .env at the repository root and configure secrets before use.
#
# Usage:
#   cp .env.example .env
#   docker compose -f infra/docker-compose.yml up --build -d

services:
  db:
    image: postgres:16-alpine
    container_name: scholarhub-db
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scholarhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-scholarhub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scholarhub} -d ${POSTGRES_DB:-scholarhub}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scholarhub-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: scholarhub-backend
    env_file:
      - ../.env
    environment:
      SCHOLARHUB_ENVIRONMENT: development
      SCHOLARHUB_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scholarhub}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-scholarhub}
      SCHOLARHUB_SECRET_KEY: ${SCHOLARHUB_SECRET_KEY}
      SCHOLARHUB_ADMIN_EMAIL: ${SCHOLARHUB_ADMIN_EMAIL:-admin@scholarhub.local}
      SCHOLARHUB_ADMIN_PASSWORD: ${SCHOLARHUB_ADMIN_PASSWORD}
      SCHOLARHUB_CORS_ORIGINS: ${SCHOLARHUB_CORS_ORIGINS:-["http://localhost", "http://localhost:5173", "http://localhost:3000"]}
      SCHOLARHUB_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_API_MODE: ${VITE_API_MODE:-remote}
        VITE_ROUTER: ${VITE_ROUTER:-browser}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    container_name: scholarhub-frontend
    env_file:
      - ../.env
    environment:
      SCHOLARHUB_API_URL: ${SCHOLARHUB_API_URL:-/api}
      SCHOLARHUB_API_MODE: ${SCHOLARHUB_API_MODE:-remote}
      SCHOLARHUB_ROUTER_MODE: ${SCHOLARHUB_ROUTER_MODE:-browser}
      SCHOLARHUB_BASE_PATH: ${SCHOLARHUB_BASE_PATH:-/}
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
