services:
  db:
    image: postgres:16-alpine
    container_name: scholarhub-db
    environment:
      POSTGRES_USER: scholarhub
      POSTGRES_PASSWORD: scholarhub
      POSTGRES_DB: scholarhub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholarhub -d scholarhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: scholarhub-backend
    environment:
      SCHOLARHUB_ENVIRONMENT: development
      SCHOLARHUB_DATABASE_URL: postgresql+asyncpg://scholarhub:scholarhub@db:5432/scholarhub
      SCHOLARHUB_SECRET_KEY: ${SCHOLARHUB_SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      SCHOLARHUB_ADMIN_EMAIL: ${SCHOLARHUB_ADMIN_EMAIL:-admin@scholarhub.local}
      SCHOLARHUB_ADMIN_PASSWORD: ${SCHOLARHUB_ADMIN_PASSWORD:-changeme}
      SCHOLARHUB_CORS_ORIGINS: '["http://localhost", "http://localhost:5173", "http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "cd /app && python -m app.db.init && python -m scripts.seed_resources && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: scholarhub-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
