# Local development stack for ScholarHUB.
# Builds the backend and frontend images and wires them together with Postgres.

services:
  postgres:
    image: postgres:16-alpine
    container_name: scholarhub-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scholarhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scholarhub}
      POSTGRES_DB: ${POSTGRES_DB:-scholarhub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scholarhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: scholarhub-backend
    environment:
      SCHOLARHUB_ENVIRONMENT: development
      SCHOLARHUB_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scholarhub}:${POSTGRES_PASSWORD:-scholarhub}@postgres:5432/${POSTGRES_DB:-scholarhub}
      SCHOLARHUB_SECRET_KEY: ${SCHOLARHUB_SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      SCHOLARHUB_ADMIN_EMAIL: ${SCHOLARHUB_ADMIN_EMAIL:-admin@scholarhub.local}
      SCHOLARHUB_ADMIN_PASSWORD: ${SCHOLARHUB_ADMIN_PASSWORD:-changeme}
      SCHOLARHUB_CORS_ORIGINS: '["http://localhost:5173","http://localhost:80","http://localhost"]
      UVICORN_WORKERS: 1
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
      args:
        VITE_API_URL: /api
        VITE_API_MODE: remote
        VITE_ROUTER: browser
        VITE_BASE_PATH: /
    container_name: scholarhub-frontend
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
