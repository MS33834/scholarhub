version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: scholarhub-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scholarhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scholarhub}
      POSTGRES_DB: ${POSTGRES_DB:-scholarhub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scholarhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scholarhub-backend
    environment:
      SCHOLARHUB_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scholarhub}:${POSTGRES_PASSWORD:-scholarhub}@postgres:5432/${POSTGRES_DB:-scholarhub}
      SCHOLARHUB_SECRET_KEY: ${SCHOLARHUB_SECRET_KEY:-change-me-in-production}
      SCHOLARHUB_ADMIN_EMAIL: ${SCHOLARHUB_ADMIN_EMAIL:-admin@scholarhub.local}
      SCHOLARHUB_ADMIN_PASSWORD: ${SCHOLARHUB_ADMIN_PASSWORD:-changeme}
      SCHOLARHUB_CORS_ORIGINS: '["http://localhost:5173","http://localhost:80"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python -m app.db.init && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: scholarhub-frontend
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
